      /* Estilos base para mantener la estética minimalista/fotográfica */

      }

      .fade-in {
        animation: fadeIn 0.8s ease-in-out forwards;

      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .img-monochrome {

        position: absolute;

        left: 0;
        background-color: white;
        transition: width 0.3s ease;
      }
      .nav-link:hover::after,
      .nav-link.active::after {
        width: 100%;
      }

              </h2>

            <div

                "Soy el alma detrás del lente que captura las historias y las
                inmortaliza para ser contadas por siempre. La fotografía es mi
                salto de fe ante la indiferencia del mundo."
              </p>

              <h3 class="text-xl font-medium text-white tracking-wide mt-8">
                Capturando la estructura de lo invisible
              </h3>
              <p>
                Explorando la relación entre el espacio y quien lo habita, mi
                fotografía busca la perfección en la geometría y la honestidad
                en la emoción. No solo capturo lugares; documento la forma en
                que la luz y las sombras transforman nuestra percepción de la
                realidad.
              </p>
              <p>
                Mi enfoque combina el rigor técnico de la arquitectura con la
                sensibilidad de un observador silencioso. No persigo la luz;
                espero el momento en que la sombra revela la verdadera forma de
                las cosas.
              </p>
              <p>
                Mi fotografía es un ejercicio de silencio y observación, donde
                la geometría de los espacios deja de ser concreto para
                convertirse en sentimiento y narrar historias. Creo en la
                honestidad del reflejo y en la fuerza de una mirada que
                encuentra el orden en el caos visual. Cada captura es un
                compromiso con la emoción pura, congelada entre líneas, sombras
                y la arquitectura de lo invisible.
              </p>
            </div>
          </div>
        </div>
      </section>
    </template>

    <!-- ==========================================
         LÓGICA JAVASCRIPT (SPA ENRUTAMIENTO Y UI)
         ========================================== -->
    <script>
      const app = {
        // Inicialización de la aplicación
        init: function () {
          this.navigate("home"); // Cargar página de inicio por defecto
          this.setupMobileMenu();

          // Efecto de header al hacer scroll
          window.addEventListener("scroll", () => {
            const header = document.querySelector("header");
            if (window.scrollY > 50) {
              header.classList.add("shadow-lg", "bg-brand-black");
              header.classList.remove("bg-brand-black/90");
            } else {
              header.classList.remove("shadow-lg", "bg-brand-black");
              header.classList.add("bg-brand-black/90");
            }
          });
        },

        // Función para navegar entre páginas (Simulación de 4 HTML files)
        navigate: function (pageId) {
          const container = document.getElementById("app-content");
          const template = document.getElementById("tpl-" + pageId);

          if (template) {
            // Limpiar contenedor actual e inyectar el nuevo contenido
            container.innerHTML = "";
            container.appendChild(template.content.cloneNode(true));

            // Hacer scroll hacia arriba
            window.scrollTo({ top: 0, behavior: "smooth" });

            // Actualizar links activos en el menú
            document.querySelectorAll(".nav-link").forEach((link) => {
              link.classList.remove("active", "text-white");
              link.classList.add("text-gray-400");
              if (link.getAttribute("data-target") === pageId) {
                link.classList.add("active", "text-white");
                link.classList.remove("text-gray-400");
              }
            });
          } else {
            console.error("Plantilla no encontrada: " + pageId);
          }
        },

        // Lógica para el menú móvil
        setupMobileMenu: function () {
          const btn = document.getElementById("mobile-menu-btn");
          btn.addEventListener("click", () => this.toggleMenu());
        },

        toggleMenu: function () {
          const menu = document.getElementById("mobile-menu");
          menu.classList.toggle("hidden");
        },

        // Manejo de formulario de contacto (Simulación)
        submitForm: function (event) {
          event.preventDefault(); // Evita que la página recargue
          const btn = event.target.querySelector('button[type="submit"]');
          const successMsg = document.getElementById("form-success");

          // Animación simple de estado de envío
          const originalText = btn.innerText;
          btn.innerText = "Enviando...";
          btn.disabled = true;
          btn.classList.add("opacity-50");

          // Simulamos una petición de red (1.5 segundos)
          setTimeout(() => {
            btn.innerText = originalText;
            btn.disabled = false;
            btn.classList.remove("opacity-50");
            event.target.reset(); // Limpiar formulario
            successMsg.classList.remove("hidden"); // Mostrar mensaje de éxito

            // Ocultar mensaje después de 5 segundos
            setTimeout(() => successMsg.classList.add("hidden"), 5000);
          }, 1500);
        },

        // Funciones para WhatsApp
        shareToWhatsApp: function () {
          // Compartir la página web actual
          const url = encodeURIComponent(window.location.href);
          const text = encodeURIComponent(
            "Echa un vistazo al portafolio de Fotografía de Autor: ",
          );
          window.open(
            `https://api.whatsapp.com/send?text=${text}${url}`,
            "_blank",
          );
        },

        directWhatsApp: function () {
          // Abrir chat directo con el fotógrafo (Reemplazar número con el real)
          const phone = "1234567890"; // <- PONER EL NÚMERO REAL AQUÍ
          const text = encodeURIComponent(
            "Hola, vi tu portafolio y tengo un proyecto en mente. Me gustaría conversar sobre él.",
          );
          window.open(`https://wa.me/${phone}?text=${text}`, "_blank");
        },
      };

      // Arrancar la app cuando el DOM esté listo
      document.addEventListener("DOMContentLoaded", () => app.init());
    </script>
